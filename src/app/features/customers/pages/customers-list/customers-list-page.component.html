<section class="page">
  <header class="page__header">
    <h2>Customers</h2>
  </header>

  <div class="page__toolbar">
    <div class="search-row">
      <label for="search-handle">Search by handle</label>
      <input
        id="search-handle"
        type="text"
        [value]="searchTerm()"
        (input)="onSearchInput($event)"
        placeholder="Filter by handle…"
      />
    </div>
  </div>

  <div class="content">
    <div class="table-container">
      @if (loading()) {
        <loading-spinner />
      } @else if (error()) {
        <empty-state [message]="error()!" type="error" />
      } @else if (customers().length === 0) {
        <empty-state message="No customers found." />
      } @else {
        <data-table
          [data]="customers()"
          [config]="customerTableConfig"
          [loadingMore]="loadingMore()"
          (rowClick)="goToCustomer($event.handle)"
          (bottomReached)="onBottomReached()"
        />
      }
    </div>
  </div>
</section>
