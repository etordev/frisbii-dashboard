<section>
  <h2>Customers</h2>

  <div class="search-row">
    <label for="search-handle">Search by handle</label>
    <input
      id="search-handle"
      type="text"
      [value]="searchTerm()"
      (input)="onSearchInput($event)"
      placeholder="Filter by handle…"
    />
  </div>

  @if (loading()) {
    <app-loading-spinner />
  } @else if (error()) {
    <app-empty-state [message]="error()!" type="error" />
  } @else if (customers().length === 0) {
    <app-empty-state message="No customers found." />
  } @else {
    <app-data-table
      [data]="customers()"
      [config]="customerTableConfig"
      (rowClick)="goToCustomer($event.handle)"
    />
  }
</section>
