<table class="invoices-table">
  <thead>
    <tr>
      <th>State</th>
      <th>Handle</th>
      <th>Amount</th>
      <th>Created</th>
    </tr>
  </thead>
  <tbody>
    @for (invoice of invoices(); track invoice.id) {
      <tr>
        <td>
          <span
            class="state-badge"
            [class]="'state-' + stateDisplay(invoice.state)"
          >
            {{ invoice.state || 'unknown' }}
          </span>
        </td>
        <td>{{ invoice.handle }}</td>
        <td>{{ invoice.amount }} {{ invoice.currency }}</td>
        <td>{{ invoice.created | date : 'mediumDate' }}</td>
      </tr>
    }
  </tbody>
</table>
